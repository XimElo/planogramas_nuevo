<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Catálogo de Exhibidores</title>
  <link rel="stylesheetody>

<header>
  <h1>Catálogo de Exhibidores</h1>
  <p class="sub">Consulta rápida de exhibidores por tienda</p>

  <div class="tiendas">
    <button class="btn-tienda" onclick="cargar('oxxo')">
      <span>OXXO</span>
    </button>
    <button class="btn-tienda" onclick="cargar('711')">
      <span>7‑Eleven</span>
    </button>
    <button class="btn-tienda" onclick="cargar('ckk')">
      <span>CCK</span>
    </button>
  </div>
</header>

<main id="contenedor" class="grid"></main>

<script>
  let todosLosItems = [];

  async function cargar(tienda) {
    console.log("Cargando tienda:", tienda);

    const cont = document.getElementById("contenedor");
    cont.innerHTML = "Cargando...";

    try {
      const respuesta = await fetch(`data/${tienda}.json`);
      todosLosItems = await respuesta.json();

      cont.innerHTML = "";

      todosLosItems.forEach(item => {
        cont.innerHTML += `
          <div class="card">
            <img src="${item.imagen}" alt="${item.nombre>
              <h3>${item.nombre}</h3>
              <p>${item.codigo}</p>
            </div>
          </div>
        `;
      });

      console.log("Items cargados:", todosLosItems.length);
    } catch (error) {
      console.error("Error al cargar:", error);
      cont.innerHTML = "Error al cargar los datos";
    }
  }

  // Carga inicial
  cargar("oxxo");
</script>

</body>
</html>

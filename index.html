<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catálogo de Exhibidores</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ====== HEADER / SELECCIÓN DE TIENDA ====== -->
<header>
  <h1>Catálogo de Exhibidores</h1>
  <p class="sub">Consulta rápida de exhibidores por tienda</p>

  <div class="tiendas">

    </header>
<button class="btn-tienda" onclick="seleccionarTienda('oxxo')">
  <img src="img/logo/oxxo.png" alt="OXXO">
  <span>OXXO</span>
</button>

<button class="btn-tienda" onclick="seleccionarTienda('711')">
  <img src="img/logo/711.png" alt="7‑Eleven">
  <span>7‑Eleven</span>
</button>

<button class="btn-tienda" onclick="seleccionarTienda('cck')">
  <img src="img/logo/ckk.png" alt="CCK">
  <span>CCK</span>
</button>
    


  </div>
  
<!-- ====== BUSCADOR ====== -->
<div class="buscador" id="buscador" style="display:none;">
  <input
    type="text"
    placeholder="Buscar por nombre o código…"
    oninput="aplicarFiltros()"
    id="inputBusqueda"
  />
</div>

<!-- ====== FILTROS ====== -->
<div class="filtros" id="filtros" style="display:none;">
  <div class="filtro-grupo">
    <span>Familia:</span>
    <button class="filtro-btn" onclick="toggleFiltro('familia','HTU')">HTU</button>
    <button class="filtro-btn" onclick="toggleFiltro('familia','ZYN')">ZYN</button>
  </div>

  <div class="filtro-grupo">
    <span>Tipo:</span>
    <button class="filtro-btn" onclick="toggleFiltro('tipo','Header')">Header</button>
    <button class="filtro-btn" onclick="toggleFiltro('tipo','NoHeader')">No Header</button>
  </div>

  <div class="filtro-grupo">
    <span>Charolas:</span>
    <button class="filtro-btn" onclick="toggleFiltro('charolas',4)">4</button>
    <button class="filtro-btn" onclick="toggleFiltro('charolas',5)">5</button>
  </div>

  <button class="btn-limpiar" onclick="limpiarFiltros()">Limpiar filtros</button>
</div>

<!-- ====== CATÁLOGO ====== -->
<main id="contenedor" class="grid"></main>

<script>
/* ====== ESTADO GLOBAL (COMO EN EL CÓDIGO QUE SÍ FUNCIONA) ====== */
let todosLosItems = [];
let itemsVisibles = [];
let filtrosActivos = {};

/* ====== CARGA DE TIENDA ====== */
async function seleccionarTienda(tienda) {
  // UI
  document.getElementById("buscador").style.display = "flex";
  document.getElementById("filtros").style.display = "flex";

  document.querySelectorAll(".btn-tienda").forEach(b => b.classList.remove("activo"));
  event.target.classList.add("activo");

  // reset estado
  filtrosActivos = {};
  document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("activo"));
  document.getElementById("inputBusqueda").value = "";

  // cargar data
  const respuesta = await fetch(`data/${tienda}.json`);
  todosLosItems = await respuesta.json();
  itemsVisibles = [...todosLosItems];

  render();
}

/* ====== FILTROS ====== */
function toggleFiltro(campo, valor) {
  if (filtrosActivos[campo] === valor) {
    delete filtrosActivos[campo];
    event.target.classList.remove("activo");
  } else {
    filtrosActivos[campo] = valor;
    event.target.classList.add("activo");
  }
  aplicarFiltros();
}

function limpiarFiltros() {
  filtrosActivos = {};
  document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("activo"));
  aplicarFiltros();
}

function aplicarFiltros() {
  const texto = document.getElementById("inputBusqueda").value.toLowerCase();

  itemsVisibles = todosLosItems.filter(item => {
    const pasaFiltros = Object.keys(filtrosActivos).every(c =>
      item[c] === filtrosActivos[c]
    );

    const pasaBusqueda =
      item.nombre.toLowerCase().includes(texto) ||
      item.codigo.toLowerCase().includes(texto);

    return pasaFiltros && pasaBusqueda;
  });

  render();
}

/* ====== RENDER CENTRAL (CLAVE) ====== */
function render() {
  const cont = document.getElementById("contenedor");
  cont.innerHTML = "";

  if (itemsVisibles.length === 0) {
    cont.innerHTML = "<p>No se encontraron resultados</p>";
    return;
  }

  itemsVisibles.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${item.imagen}".nombre}</h3>
        <p>${item.codigo}</p>
      </div>
    `;
    cont.appendChild(card);
  });
}
</script>

</body>
</html>

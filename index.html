<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catálogo de Exhibidores</title>
   <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ========================
     VISTA HOME
======================== -->

<div id="homeView">
  <header>
    <h1>Bienvenido a los Planogramas Web</h1>
    <p class="sub">POGS ABRIL 2026</p>

    <div class="tiendas">
      <button class="btn-tienda" onclick="abrirTienda('oxxo', this)">
        <img src="img/logo/oxxo.png" alt="OXXO">
        <span>OXXO</span>
      </button>

      <button class="btn-tienda" onclick="abrirTienda('711', this)">
        <img src="img/logo/711.png" alt="7-Eleven">
      <span>7‑Eleven</span>
      </button>

      <button class="btn-tienda" onclick="abrirTienda('cck', this)">
        <img src="img/logo/ckk.png" alt="CCK">
        <span>CCK</span>
      </button>
    </div>
  </header>
</div>

<!-- ========================
     VISTA CATÁLOGO
======================== -->
<div id="catalogoView" style="display:none;">


  <div class="top-bar">
    <button onclick="volverInicio()">← Volver</button>
    <span>Items: <strong id="contador">0</strong></span>
    <button onclick="limpiarFiltros()">Limpiar filtros</button>
  </div>

  <div class="buscador">
    <input
      type="text"
      id="inputBusqueda"
      placeholder="Buscar por nombre o código…"
      oninput="aplicarFiltros()"
    />
  </div>

  <div class="filtros" id="filtros"></div>

  <main id="contenedor" class="grid"></main>
</div>

<script>
/* ========================
   ESTADO GLOBAL
======================== */
let todos = [];
let visibles = [];
let filtrosActivos = {};

/* ========================
   ABRIR TIENDA
======================== */
async function abrirTienda(tienda, btn) {
  document.getElementById("homeView").style.display = "none";
  document.getElementById("catalogoView").style.display = "block";

  document.querySelectorAll(".btn-tienda").forEach(b => b.classList.remove("activo"));
  btn.classList.add("activo");

  filtrosActivos = {};
  document.getElementById("inputBusqueda").value = "";

  const res = await fetch(`data/${tienda}.json`);
  todos = await res.json();
   generarFiltrosPorTienda(tienda);
  render();


  // Inferir programa para OXXO según carpeta
  if (tienda === "oxxo") {
    todos = todos.map(item => {
      if (!item.programa && item.imagen) {
        if (item.imagen.includes("/abril_26/")) item.programa = "ABRIL_26";
        else if (item.imagen.includes("/cc_burbuja_red/")) item.programa = "CC_BURBUJA_RED";
        else if (item.imagen.includes("/cc_mix/")) item.programa = "CC_MIX";
        else if (item.imagen.includes("/cc_red/")) item.programa = "CC_RED";
      }
      return item;
    });
  }

  visibles = [...todos];
  generarFiltrosPorTienda(tienda);
  render();
}

/* ========================
   VOLVER
======================== */
function volverInicio() {
  document.getElementById("catalogoView").style.display = "none";
  document.getElementById("homeView").style.display = "block";
}

/* ========================
   FILTROS
======================== */
function setFiltro(campo, valor, btn) {
  if (!filtrosActivos[campo]) filtrosActivos[campo] = [];

  const i = filtrosActivos[campo].indexOf(valor);

  if (i === -1) {
    filtrosActivos[campo].push(valor);
    btn.classList.add("activo");
  } else {
    filtrosActivos[campo].splice(i, 1);
    btn.classList.remove("activo");
    if (filtrosActivos[campo].length === 0) delete filtrosActivos[campo];
  }

  aplicarFiltros();
}

function limpiarFiltros() {
  filtrosActivos = {};
  document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("activo"));
  aplicarFiltros();
}

function aplicarFiltros() {
  const texto = document.getElementById("inputBusqueda").value.toLowerCase();

  visibles = todos.filter(item => {
    const matchFiltros = Object.keys(filtrosActivos).every(campo => {
      const filtrosCampo = filtrosActivos[campo];

      if (Array.isArray(item[campo])) {
        return filtrosCampo.some(v => item[campo].map(String).includes(String(v)));
      }

      return filtrosCampo.map(String).includes(String(item[campo]));
    });

    const matchTexto =
      (item.nombre && item.nombre.toLowerCase().includes(texto)) ||
      (item.codigo && item.codigo.toLowerCase().includes(texto));

    return matchFiltros && matchTexto;
  });

  render();
}

/* ========================
   RENDER
======================== */
function render() {
  const cont = document.getElementById("contenedor");
  cont.innerHTML = "";

  document.getElementById("contador").textContent = visibles.length;

  if (visibles.length === 0) {
    const p = document.createElement("p");
    p.textContent = "No se encontraron resultados";
    cont.appendChild(p);
    return;
  }

  visibles.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = item.imagen;
    img.alt = item.nombre;

    const info = document.createElement("div");
    info.className = "info";

    const h3 = document.createElement("h3");
    h3.textContent = item.nombre;

    const p = document.createElement("p");
    p.textContent = item.codigo;

    info.appendChild(h3);
    info.appendChild(p);

    card.appendChild(img);
    card.appendChild(info);
    cont.appendChild(card);
  });
}

  
/* ========================
   FILTROS POR TIENDA
======================== */
  
function generarFiltrosPorTienda(tienda) {
  const f = document.getElementById("filtros");
  f.innerHTML = "";

  if (tienda === "oxxo") {
    f.innerHTML = `
      <div class="filtro-grupo">
        <span>Familia:</span>
        <button class="filtro-btn" onclick="setFiltro('familia','HTU',this)">HTU</button>
        <button class="filtro-btn" onclick="setFiltro('familia','ZYN',this)">ZYN</button>
        <button class="filtro-btn" onclick="setFiltro('familia','NA',this)">NA</button>
      </div>

      <div class="filtro-grupo">
        <span>Header:</span>
        <button class="filtro-btn" onclick="setFiltro('header','HEADER',this)">Header</button>
        <button class="filtro-btn" onclick="setFiltro('header','NOHEADER',this)">No Header</button>
      </div>

      <div class="filtro-grupo">
        <span>Charolas:</span>
        <button class="filtro-btn" onclick="setFiltro('charolas',4,this)">4</button>
        <button class="filtro-btn" onclick="setFiltro('charolas',5,this)">5</button>
      </div>

      <div class="filtro-grupo">
      <span>Tipo de Charola:</span>
      <button class="filtro-btn" onclick="setFiltro('tipo_charola','CHARHTU',this)">HTU</button>
      <button class="filtro-btn" onclick="setFiltro('tipo_charola','CHARHTU_ZYN',this)">HTU_ZYN</button>
      <button class="filtro-btn" onclick="setFiltro('tipo_charola','CHARHTU_ZYN_CHARZYN',this)">HTU_ZYN_CHARZYN</button>
      <button class="filtro-btn" onclick="setFiltro('tipo_charola','CHARHTU_ZYN_CHARZYN25',this)">HTU_ZYN_CHARZYN25</button>
      <button class="filtro-btn" onclick="setFiltro('tipo_charola','CHARZYN',this)">CHARZYN</button>
      <button class="filtro-btn" onclick="setFiltro('tipo_charola','CHARZYN25',this)">CHARZYN25</button>
    </div>

      <div class="filtro-grupo">
        <span>Programa:</span>
        <button class="filtro-btn" onclick="setFiltro('programa','ABRIL_26',this)">Abril 26</button>
        <button class="filtro-btn" onclick="setFiltro('programa','CC_BURBUJA_RED',this)">CC Burbuja Red</button>
        <button class="filtro-btn" onclick="setFiltro('programa','CC_MIX',this)">CC Mix</button>
        <button class="filtro-btn" onclick="setFiltro('programa','CC_RED',this)">CC Red</button>
      </div>
    `;
  }

  if (tienda === "cck") {
    f.innerHTML = `
      <div class="filtro-grupo">
        <span>Familia:</span>
        <button class="filtro-btn" onclick="setFiltro('familia','HTU',this)">HTU</button>
        <button class="filtro-btn" onclick="setFiltro('familia','ZYN',this)">ZYN</button>
        <button class="filtro-btn" onclick="setFiltro('familia','RESELLER',this)">Reseller</button>
      </div>

      <div class="filtro-grupo">
        <span>FT:</span>
        <button class="filtro-btn" onclick="setFiltro('ft',2,this)">2</button>
        <button class="filtro-btn" onclick="setFiltro('ft',3,this)">3</button>
        <button class="filtro-btn" onclick="setFiltro('ft',4,this)">4</button>
        <button class="filtro-btn" onclick="setFiltro('ft',5,this)">5</button>
        <button class="filtro-btn" onclick="setFiltro('ft',6,this)">6</button>
        <button class="filtro-btn" onclick="setFiltro('ft',7,this)">7</button>
      </div>
    `;
  }

  if (tienda === "711") {
    f.innerHTML = `
      <div class="filtro-grupo">
        <span>Familia:</span>
        <button class="filtro-btn" onclick="setFiltro('familia','RESELLER',this)">Reseller</button>
        <button class="filtro-btn" onclick="setFiltro('familia','NA',this)">NA</button>
      </div>

       <div class="filtro-grupo">
        <span>FT:</span>
        <button class="filtro-btn" onclick="setFiltro('ft',2,this)">2</button>
        <button class="filtro-btn" onclick="setFiltro('ft',3,this)">3</button>
        <button class="filtro-btn" onclick="setFiltro('ft',4,this)">4</button>
        <button class="filtro-btn" onclick="setFiltro('ft',5,this)">5</button>
        <button class="filtro-btn" onclick="setFiltro('ft',6,this)">6</button>
        <button class="filtro-btn" onclick="setFiltro('ft',7,this)">7</button>
      </div>

      
    `;
  }
}
</script>

</body>
</html>

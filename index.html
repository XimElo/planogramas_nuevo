<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catálogo de Exhibidores</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ========================
     VISTA HOME
======================== -->
<div id="homeView">
  <header>
    <h1>Bienvenido a los Planogramas Web</h1>
    <p class="sub">POGS ABRIL 2026</p>

    <div class="tiendas">
      <button class="btn-tienda" onclick="abrirTienda('oxxo', this)">
  <img src="img/logo/oxxo.png" alt="OXXO">
  <span>OXXO</span>
</button>

<button class="btn-tienda" onclick="abrirTienda('711', this)">
  <img src="img/logo/711.png" alt="7‑Eleven">
  <span>7‑Eleven</span>
</button>

<button class="btn-tienda" onclick="abrirTienda('ckk', this)">
  <img src="img/logo/ckk.png" alt="CCK">
  <span>CCK</span>
</button>
    </div>
  </header>
</div>

<!-- ========================
     VISTA CATÁLOGO
======================== -->
<div id="catalogoView" style="display:none;">

  <!-- Barra superior -->
  <div class="top-bar">
    <button onclick="volverInicio()">← Volver</button>
    <span>Items: <strong id="contador">0</strong></span>
    <button onclick="limpiarFiltros()">Limpiar filtros</button>
  </div>

  <!-- Buscador -->
  <div class="buscador">
    <input
      type="text"
      id="inputBusqueda"
      placeholder="Buscar por nombre o código…"
      oninput="aplicarFiltros()"
    />
  </div>

  <!-- Filtros (se llenarán según tienda) -->
  <div class="filtros" id="filtros"></div>

  <!-- Grid -->
  <main id="contenedor" class="grid"></main>
</div>

<script>
/* ========================
   ESTADO GLOBAL
======================== */
let todos = [];
let visibles = [];
let filtrosActivos = {};
let tiendaActual = "";

/* ========================
   ABRIR TIENDA
======================== */
async function abrirTienda(tienda, btn) {
  document.getElementById("homeView").style.display = "none";
  document.getElementById("catalogoView").style.display = "block";

  // activar botón
  document.querySelectorAll(".btn-tienda").forEach(b => b.classList.remove("activo"));
  btn.classList.add("activo");

  // reset estado
  filtrosActivos = {};
  document.getElementById("inputBusqueda").value = "";

  const res = await fetch(`data/${tienda}.json`);
  todos = await res.json();
  visibles = [...todos];

  generarFiltrosPorTienda(tienda);
  render();
}
/* ========================
   VOLVER
======================== */
function volverInicio() {
  document.getElementById("catalogoView").style.display = "none";
  document.getElementById("homeView").style.display = "block";
}

/* ========================
   FILTROS
======================== */
function setFiltro(campo, valor) {
  filtrosActivos[campo] = valor;
  aplicarFiltros();
}

function limpiarFiltros() {
  filtrosActivos = {};
  aplicarFiltros();
}

function aplicarFiltros() {
  const texto = document.getElementById("inputBusqueda").value.toLowerCase();

  visibles = todos.filter(item => {
    const matchFiltros = Object.keys(filtrosActivos).every(key =>
      item[key] === filtrosActivos[key]
    );

    const matchTexto =
      item.nombre.toLowerCase().includes(texto) ||
      item.codigo.toLowerCase().includes(texto);

    return matchFiltros && matchTexto;
  });

  render();
}

/* ========================
   RENDER
======================== */
function render() {
  const cont = document.getElementById("contenedor");
  cont.innerHTML = "";

  document.getElementById("contador").textContent = visibles.length;

  if (visibles.length === 0) {
    cont.innerHTML = "<p>No se encontraron resultados</p>";
    return;
  }

  visibles.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
  <img src="${item.imagen}" alt="${item.nombre}">
  <div class="info">
    <h3>${item.nombre}</h3>
    <p>${item.codigo}</p>
  </div>
`;

    cont.appendChild(card);
  });
}
/* ========================
   FILTROS POR TIENDA
======================== */
function generarFiltrosPorTienda(tienda) {
  const filtros = document.getElementById("filtros");
  filtros.innerHTML = "";

  if (tienda === "oxxo") {
    filtros.innerHTML = `
      <div class="filtro-grupo">
        <span>Familia:</span>
        <button onclick="setFiltro('familia','HTU')">HTU</button>
        <button onclick="setFiltro('familia','ZYN')">ZYN</button>
        <button onclick="setFiltro('familia','NA')">NA</button>
      </div>
      <div class="filtro-grupo">
        <span>Header:</span>
        <button onclick="setFiltro('header','HEADER')">Header</button>
        <button onclick="setFiltro('header','NOHEADER')">No Header</button>
      </div>
      <div class="filtro-grupo">
        <span>Charolas:</span>
        <button onclick="setFiltro('charolas',4)">4</button>
        <button onclick="setFiltro('charolas',5)">5</button>
      </div>
      <div class="filtro-grupo">
        <span>Tipo de Charola:</span>
        <button onclick="setFiltro('Charola','CHARHTU')">HTU</button>
        <button onclick="setFiltro('Charola','CHARHTU_ZYN')">HTU_ZYN</button>
        <button onclick="setFiltro('Charola','CHARHTU_ZYN_CHARZYN')">HTU_ZYN_CHARZYN</button>
        <button onclick="setFiltro('Charola','CHARHTU_ZYN_CHARZYN25')">HTU_ZYN_CHARZYN25</button>
        <button onclick="setFiltro('Charola','CHARZYN')">CHARZYN</button>
        <button onclick="setFiltro('Charola','CHARZYN25')">CHARZYN25</button>
      </div>
    `;
  }

  if (tienda === "ckk") {
    filtros.innerHTML = `
      <div class="filtro-grupo">
        <span>Familia:</span>
        <button onclick="setFiltro('familia','HTU')">HTU</button>
        <button onclick="setFiltro('familia','ZYN')">ZYN</button>
        <button onclick="setFiltro('familia','RESELLER')">Reseller</button>
      </div>
      <div class="filtro-grupo">
        <span>FT:</span>
        <button onclick="setFiltro('ft',2)">2</button>
        <button onclick="setFiltro('ft',3)">3</button>
        <button onclick="setFiltro('ft',4)">4</button>
        <button onclick="setFiltro('ft',5)">5</button>
        <button onclick="setFiltro('ft',6)">6</button>
        <button onclick="setFiltro('ft',7)">7</button>
      </div>
    `;
  }

  if (tienda === "711") {
    filtros.innerHTML = `
      <div class="filtro-grupo">
        <span>Familia:</span>
        <button onclick="setFiltro('familia','RESELLER')">Reseller</button>
        <button onclick="setFiltro('familia','NA')">NA</button>
      </div>
    `;
  }
}
</script>

</body>
</html>
